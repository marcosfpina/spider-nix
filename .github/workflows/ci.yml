name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Code Quality (Fast Fail)
  # Portfolio Value: Shows commitment to code quality with automated linting
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linting
        run: ruff check .

      - name: Run Ruff formatting check
        run: ruff format --check .

  # Job 2: Type Checking
  # Portfolio Value: Demonstrates static typing discipline
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run mypy type checking
        run: mypy src/spider_nix --ignore-missing-imports

  # Job 3: Matrix Testing with Coverage
  # Portfolio Value: Shows compatibility across Python versions and test coverage metrics
  test:
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Playwright browsers
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=spider_nix \
            --cov-report=xml \
            --cov-report=term \
            --cov-report=html \
            -v

      - name: Upload coverage to Codecov (Python 3.13 only)
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          flags: unittests
          name: spider-nix-coverage
          fail_ci_if_error: false

  # Job 4: Build Test
  # Portfolio Value: Validates package can be built and installed correctly
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build tools
        run: pip install build hatchling

      - name: Build package
        run: python -m build

      - name: Check dist artifacts
        run: |
          ls -lh dist/
          pip install dist/*.whl
          spider-nix --help
