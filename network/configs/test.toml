# Test configuration for spider-network-proxy

[proxy]
http_listen = "127.0.0.1:8080"
socks5_listen = "127.0.0.1:1080"
timeout_seconds = 30

[tls]
fingerprint_rotation = true
profile_cache_ttl_hours = 24
browser_pool = ["chrome", "firefox", "safari", "edge"]

[http2]
randomize_settings = true
enable_push = true
